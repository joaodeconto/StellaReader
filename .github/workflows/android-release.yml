name: Android APK release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-apk:
    if: startsWith(github.ref, 'refs/tags/v') || contains(github.event.head_commit.message, '[release]') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Resolve release version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
          else
            APP_VERSION="$(awk '/^version:/ {print $2}' pubspec.yaml | cut -d+ -f1)"
            RELEASE_TAG="v${APP_VERSION}"
          fi
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          cp build/app/outputs/flutter-apk/app-release.apk "StellaReader-${RELEASE_TAG}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: StellaReader-APK
          path: StellaReader-*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: StellaReader ${{ env.RELEASE_TAG }}
          files: StellaReader-*.apk
          generate_release_notes: true
